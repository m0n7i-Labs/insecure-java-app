name: Build, Scan, and Publish Docker Image

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-scan-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # 1. Setup Java Environment
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # 2. Build the JAR file (Fixes the "target/not found" error)
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # 3. Log in to GitHub Container Registry
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4. Build the Docker Image locally (DO NOT PUSH YET)
      - name: Build Docker image
        uses: docker/build-push-action@v3
        with:
          context: .
          file: ./Dockerfile
          push: false  # Build locally so we can scan it first
          load: true   # This loads the image into the local Docker daemon for scanning
          tags: |
            ghcr.io/m0n7i-labs/vulnerable-java:latest
            ghcr.io/m0n7i-labs/vulnerable-java:${{ github.sha }}

      # 5. Wiz CLI Setup and Scan
      - name: Download Wiz CLI
        run: curl -o wizcli https://downloads.wiz.io/wizcli/latest/wizcli-linux-amd64 && chmod +x wizcli

      - name: Authenticate to Wiz
        run: ./wizcli auth --id "$WIZ_CLIENT_ID" --secret "$WIZ_CLIENT_SECRET"
        env:
          WIZ_CLIENT_ID: ${{ secrets.WIZ_CLIENT_ID }}
          WIZ_CLIENT_SECRET: ${{ secrets.WIZ_CLIENT_SECRET }}

      - name: Run wiz-cli docker image scan
        # This will fail the build if vulnerabilities are found
        run: ./wizcli docker scan --image
